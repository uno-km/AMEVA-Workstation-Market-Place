<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Pdf Rag Preview</title>
  <link rel="stylesheet" href="preview-shared.css">
  <style>
    @keyframes float { 0% {transform:translateY(0);} 50% {transform:translateY(-15px);} 100% {transform:translateY(0);} }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">
      <img src="https://ui-avatars.com/api/?name=Pdf%20Rag&background=random&color=fff&size=128&bold=true" class="preview-icon" alt="icon" />
      <div class="preview-title">
        <h2>Pdf Rag <span style="font-size:12px; padding:2px 8px; border-radius:12px; background:rgba(59,130,246,0.2); color:var(--primary); vertical-align:middle; margin-left:8px;">Standard</span></h2>
        <p>실제 작동 화면 미리보기 (Mockup Simulation)</p>
      </div>
    </div>
    <div class="preview-body">
      <div class="mock-window">
        <div class="mock-titlebar">
          <div class="mock-dot r"></div><div class="mock-dot y"></div><div class="mock-dot g"></div>
        </div>
        <div class="mock-content">
          <div class="pulse" style="font-size: 4rem; margin-bottom: 20px;">✨</div><div style="text-align:center;"><h3 style="color:#fff;margin-bottom:10px;">Pdf Rag</h3><p>이 플러그인의 인터랙티브 시뮬레이션 환경입니다.</p></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
