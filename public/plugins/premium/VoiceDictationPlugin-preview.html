<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Voice Dictation Plugin Preview</title>
  <link rel="stylesheet" href="../preview-shared.css">
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; }
    body, html { margin:0; padding:0; height:100%; width:100%; overflow:hidden; }
    /* Ensure content takes full space in mock-content */
    .mock-content { padding: 0 !important; overflow: hidden !important; }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">
      <img src="https://ui-avatars.com/api/?name=Voice%20Dictation%20Plugin&background=random&color=fff&size=128&bold=true" class="preview-icon" alt="icon" />
      <div class="preview-title">
        <h2 style="font-size:1.4rem; display:flex; align-items:center; gap:8px;">
          Voice Dictation Plugin
          <span style="font-size:11px; padding:2px 8px; border-radius:12px; background:rgba(236,72,153,0.15); color:var(--premium); font-weight:bold; border:1px solid rgba(236,72,153,0.3);">
            👑 Premium
          </span>
        </h2>
        <p style="font-size:0.85rem; color:#64748b;">AMEVA Workspace Simulation Engine</p>
      </div>
    </div>
    <div class="preview-body">
      <div class="mock-window" style="box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
        <div class="mock-titlebar">
          <div class="mock-dot r"></div><div class="mock-dot y"></div><div class="mock-dot g"></div>
          <div class="mock-title-text">Voice Dictation Plugin - Interactive Preview</div>
        </div>
        <div class="mock-content" style="height:100%; display:flex; flex-direction:column;">
          
      <div style="width:100%; height:100%; background:linear-gradient(135deg, #0f172a, #1e1b4b); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:sans-serif; position:relative;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; height:300px; border-radius:50%; background:radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%); animation:pulse 2s infinite;"></div>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:200px; height:200px; border-radius:50%; background:radial-gradient(circle, rgba(217,70,239,0.3) 0%, transparent 70%); animation:pulse 2s infinite; animation-delay:0.5s;"></div>
        
        <div style="width:100px; height:100px; background:linear-gradient(135deg, #8b5cf6, #d946ef); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(217,70,239,0.6); margin-bottom:60px; z-index:10; font-size:40px;">
          🎙️
        </div>
        
        <div style="display:flex; align-items:center; gap:8px; height:60px; z-index:10;">
          
            <div class="float-anim" style="width:6px; height:30%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:50%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.1s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:80%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.2s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:40%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.30000000000000004s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:90%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.4s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:60%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.5s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:100%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.6000000000000001s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:50%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.7000000000000001s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:70%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.8s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:40%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:0.9s; animation-duration:0.8s;"></div>
          
            <div class="float-anim" style="width:6px; height:30%; background:linear-gradient(to top, #8b5cf6, #d946ef); border-radius:3px; animation-delay:1s; animation-duration:0.8s;"></div>
          
        </div>
        
        <div style="margin-top:40px; color:#e2e8f0; font-size:24px; font-weight:300; letter-spacing:1px; z-index:10; text-align:center;">
          "Listening to your voice..."<br>
          <span style="font-size:14px; color:#94a3b8; font-weight:bold; letter-spacing:2px; margin-top:16px; display:inline-block;">PROCESSING LIVE AUDIO</span>
        </div>
      </div>
    
        </div>
      </div>
    </div>
  </div>
</body>
</html>
