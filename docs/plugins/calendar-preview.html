<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Calendar Preview</title>
  <link rel="stylesheet" href="preview-shared.css">
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; }
    body, html { margin:0; padding:0; height:100%; width:100%; overflow:hidden; }
    /* Ensure content takes full space in mock-content */
    .mock-content { padding: 0 !important; overflow: hidden !important; }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">
      <img src="https://ui-avatars.com/api/?name=Calendar&background=random&color=fff&size=128&bold=true" class="preview-icon" alt="icon" />
      <div class="preview-title">
        <h2 style="font-size:1.4rem; display:flex; align-items:center; gap:8px;">
          Calendar
          <span style="font-size:11px; padding:2px 8px; border-radius:12px; background:rgba(59,130,246,0.15); color:var(--primary); font-weight:bold; border:1px solid rgba(59,130,246,0.3);">
            Standard
          </span>
        </h2>
        <p style="font-size:0.85rem; color:#64748b;">AMEVA Workspace Simulation Engine</p>
      </div>
    </div>
    <div class="preview-body">
      <div class="mock-window" style="box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
        <div class="mock-titlebar">
          <div class="mock-dot r"></div><div class="mock-dot y"></div><div class="mock-dot g"></div>
          <div class="mock-title-text">Calendar - Interactive Preview</div>
        </div>
        <div class="mock-content" style="height:100%; display:flex; flex-direction:column;">
          
        <div style="width:100%; height:100%; background:#fff; display:flex; font-family:sans-serif;">
          <div style="width:200px; border-right:1px solid #e2e8f0; background:#f8fafc; padding:20px;">
            <div style="font-size:20px; font-weight:bold; margin-bottom:24px; color:#0f172a;">October 2024</div>
            <div style="display:flex; flex-direction:column; gap:12px;">

              <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; border-radius:50%; background:#3b82f6;"></div>Personal</div>
              <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; border-radius:50%; background:#10b981;"></div>Family</div>
            </div>
          </div>
          <div style="flex:1; padding:20px; overflow:hidden;">
            <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:1px; background:#e2e8f0; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; height:100%;">
              <div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Sun</div><div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Mon</div><div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Tue</div><div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Wed</div><div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Thu</div><div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Fri</div><div style="background:#f8fafc; padding:8px; font-weight:bold; text-align:center; font-size:12px; color:#64748b;">Sat</div>
              <div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">1</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">2</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">3</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">4</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">5</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">6</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">7</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">8</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">9</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">10</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">11</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">12</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">13<div class="pop-in" style="background:#ef4444; color:#fff; font-size:10px; padding:2px 4px; border-radius:4px; margin-top:4px; margin-bottom:2px; cursor:pointer; box-shadow:0 2px 4px rgba(239,68,68,0.3);">Project Due</div></div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">14</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:bold; color:#3b82f6;">15</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">16</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">17</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">18</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">19<div class="pop-in" style="background:#3b82f6; color:#fff; font-size:10px; padding:2px 4px; border-radius:4px; margin-top:4px; cursor:pointer; animation-delay:0.2s;">Dentist</div></div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">20</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">21</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">22</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">23</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">24</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">25<div class="pop-in" style="background:#10b981; color:#fff; font-size:10px; padding:2px 4px; border-radius:4px; margin-top:4px; cursor:pointer; animation-delay:0.4s;">Dinner</div></div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">26</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">27</div><div style="background:#fff; min-height:80px; padding:8px; font-size:14px; color:#334155; font-weight:normal; ">28</div>
            </div>
          </div>
        </div>
      
        </div>
      </div>
    </div>
  </div>
</body>
